# GitHub Pages (Jekyll) configuration for the Record Health Check docs site.
# Served from the /docs folder on the main branch.
#
# Custom layouts in _layouts/ supply the site design (see assets/css/style.css);
# no remote theme is used. The default GitHub Pages plugins do the heavy lifting:
#   - jekyll-optional-front-matter: renders the front-matter-less .md docs
#   - jekyll-default-layout:        gives them a layout
#   - jekyll-relative-links:        rewrites relative .md links to page URLs
title: Record Health Check
description: Metadata-driven, advisory record health checks for Salesforce
url: https://gkolan.github.io
baseurl: /recordHealthCheck

# Apply the doc-page layout to every page; index.html overrides this to "home".
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Keep maintainer-only and non-doc folders out of the published site.
exclude:
  - _templates/
  - interactive/
  - audits/
  - enhancements/
